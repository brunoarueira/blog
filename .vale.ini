StylesPath = vale/styles
MinAlertLevel = warning

Packages = alex, proselint, write-good

IgnoredScopes = code, strong, tt

# Specifies what Vale considers to be a boundary between words.
WordTemplate = \s(?:%s)\s

# The "formats" section allows you to associate an "unknown" format
# with one of Vale's supported formats.
[formats]
mdx = md

# Global settings (applied to every syntax)
[*{.md,mdx}]
# List of styles to load
BasedOnStyles = alex, proselint, write-good

# Disable low-signal rules that create a lot of false positives in narrative writing.
write-good.E-Prime = NO
write-good.Weasel = NO
write-good.Passive = NO
write-good.TooWordy = NO

# Keep this rule but lower severity from error to warning.
write-good.ThereIs = warning

# Avoid occasional false positives for words like "reject" in software context.
alex.ProfanityUnlikely = NO
